<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Audio Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── PALETA: Deep Ocean ───────────────────────────────────────────────
   bg        #070d1a   fondo principal  (azul marino profundo)
   surface   #0d1526   superficies secundarias
   card      #111e33   tarjetas
   border    #1e2e4a   bordes sutiles
   ink       #dce8ff   texto principal
   ink2      #7a90b8   texto secundario
   accent    #38bdf8   azul cielo eléctrico  (reemplaza violeta)
   green     #34d399   verde esmeralda  (correcto)
   red       #f87171   rojo coral  (incorrecto)
   gold      #fbbf24   ámbar  (score/objetivo)
   teal      #2dd4bf   cian  (seleccionado)
──────────────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #070d1a; color: #7a90b8; font-family: 'Outfit', sans-serif; min-height: 100vh; font-size: 18px }

/* HEADER */
.header {
  background: linear-gradient(135deg, #0d1526 0%, #070d1a 100%);
  border-bottom: 1px solid #1e2e4a;
  padding: 20px 24px;
  display: flex; align-items: center; gap: 16px;
}
.logo {
  width: 52px; height: 52px; border-radius: 14px;
  background: linear-gradient(135deg, #0ea5e9, #38bdf8);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; flex-shrink: 0;
  box-shadow: 0 0 18px rgba(56,189,248,0.35);
}
.header-info h1 { font-size: 1.4rem; font-weight: 800; color: #dce8ff; }
.header-info h1 span { color: #38bdf8; }
.header-info p { color: #7a90b8; font-size: 0.8rem; margin-top: 3px; }
.score-area { margin-left: auto; text-align: right; }
.score-num { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 500; color: #fbbf24; line-height: 1; }
.score-lbl { font-size: 0.7rem; color: #7a90b8; }

/* TABS */
.tabs-bar {
  background: #0d1526;
  border-bottom: 1px solid #1e2e4a;
  display: flex; overflow-x: auto; scrollbar-width: none;
  padding: 0 12px;
}
.tabs-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 13px 16px; cursor: pointer; white-space: nowrap;
  font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: #7a90b8;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.2s;
}
.tab:hover { color: #a8c0e0; }
.tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }

/* MAIN */
.main { max-width: 820px; margin: 0 auto; padding: 28px 14px 80px; }

/* MODULE BANNER */
.mod-banner {
  border-radius: 16px; padding: 22px 24px; margin-bottom: 24px;
  background: linear-gradient(135deg, #0f1e38 0%, #111e33 100%);
  border: 1px solid #1e2e4a;
  display: flex; align-items: center; gap: 18px;
}
.mod-num {
  font-family: 'DM Mono', monospace; font-size: 2.8rem; font-weight: 500;
  color: #38bdf8; line-height: 1; flex-shrink: 0;
}
.mod-info h2 { font-size: 1.2rem; font-weight: 700; color: #dce8ff; }
.mod-info p { color: #7a90b8; font-size: 0.82rem; margin-top: 4px; }
.mod-progress { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
.pbar { flex: 1; height: 4px; background: #1e2e4a; border-radius: 10px; overflow: hidden; }
.pbar-fill { height: 100%; background: #38bdf8; border-radius: 10px; transition: width 0.4s ease; }
.pbar-txt { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: #7a90b8; }

/* QUESTION CARD */
.qcard {
  background: #111e33; border: 1.5px solid #1e2e4a;
  border-radius: 16px; padding: 20px; margin-bottom: 14px;
  transition: border-color 0.3s;
}
.qcard.ok { border-color: #34d399; }
.qcard.fail { border-color: #f87171; }

.qhead { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.qnum {
  width: 28px; height: 28px; flex-shrink: 0; border-radius: 8px;
  background: #0d1526; border: 1px solid #1e2e4a;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 0.78rem; color: #7a90b8;
}
.qcard.ok .qnum { background: #34d399; color: #000; border-color: #34d399; }
.qcard.fail .qnum { background: #f87171; color: #fff; border-color: #f87171; }

.type-pill {
  font-size: 0.62rem; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; padding: 3px 9px; border-radius: 20px; margin-left: auto;
}
.pill-listen { background: rgba(56,189,248,0.15); color: #38bdf8; }
.pill-speak { background: rgba(248,113,113,0.15); color: #f87171; }
.pill-mc { background: rgba(45,212,191,0.15); color: #2dd4bf; }

.qtext { font-size: 0.92rem; line-height: 1.5; color: #7a90b8; flex: 1; }

/* AUDIO PLAYER */
.audio-box {
  background: #0d1526; border: 1px solid #1e2e4a;
  border-radius: 12px; padding: 14px 16px; margin: 12px 0;
  display: flex; align-items: center; gap: 12px;
}
.play-btn {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  background: #0ea5e9;
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: transform 0.15s, background 0.2s;
  color: #fff;
}
.play-btn:hover { transform: scale(1.08); background: #0284c7; }
.play-btn.playing { background: #fbbf24; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,0.4)} 50%{box-shadow:0 0 0 8px rgba(251,191,36,0)} }
.audio-info { flex: 1; }
.audio-label { font-size: 0.8rem; color: #7a90b8; }
.audio-text-hidden { font-size: 0.85rem; color: #7a90b8; margin-top: 3px; display: none; font-style: italic; }
.audio-text-hidden.revealed { display: block; color: #34d399; }
.replay-hint { font-size: 0.72rem; color: #7a90b8; margin-top: 2px; }
.speed-wrap { display: flex; gap: 6px; flex-shrink: 0; }
.speed-btn {
  background: #1e2e4a; border: none; border-radius: 6px;
  padding: 4px 8px; font-size: 0.72rem; color: #7a90b8; cursor: pointer;
  font-family: 'DM Mono', monospace; transition: all 0.15s;
}
.speed-btn:hover { background: #0ea5e9; color: #fff; }
.speed-btn.active { background: #0ea5e9; color: #fff; }

/* MICROPHONE */
.mic-box {
  background: #0d1526; border: 1.5px dashed #1e2e4a;
  border-radius: 12px; padding: 16px; margin: 12px 0;
  text-align: center;
}
.mic-target {
  font-size: 1rem; font-weight: 600; color: #fbbf24;
  margin-bottom: 12px; letter-spacing: 0.02em;
}
.mic-phonetic { font-size: 0.78rem; color: #7a90b8; margin-bottom: 12px; font-family: 'DM Mono', monospace; }
.mic-btn {
  width: 54px; height: 54px; border-radius: 50%;
  background: #0d1526; border: 2px solid #f87171;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; transition: all 0.2s; margin: 0 auto 10px;
}
.mic-btn:hover { background: rgba(248,113,113,0.1); transform: scale(1.05); }
.mic-btn.recording { background: #f87171; border-color: #f87171; animation: micpulse 0.8s infinite; }
@keyframes micpulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.5)} 50%{box-shadow:0 0 0 12px rgba(248,113,113,0)} }
.mic-status { font-size: 0.78rem; color: #7a90b8; }
.mic-result { font-size: 0.85rem; margin-top: 8px; font-family: 'DM Mono', monospace; min-height: 20px; }
.mic-result.heard { color: #2dd4bf; }

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 8px; }
.opt {
  display: flex; align-items: center; gap: 10px;
  background: #0d1526; border: 1.5px solid #1e2e4a;
  border-radius: 10px; padding: 16px 16px;
  cursor: pointer; font-size: 1rem; color: #7a90b8;
  transition: all 0.2s ease; user-select: none;
}
.opt:hover:not(.disabled) { border-color: #38bdf8; background: rgba(56,189,248,0.07); }
.opt.selected { border-color: #2dd4bf; background: rgba(45,212,191,0.07); }
.opt.correct { border-color: #34d399; background: #071a10; color: #34d399; font-weight: 600; }
.opt.wrong { border-color: #f87171; background: #1a0707; color: #f87171; }
.opt.disabled { cursor: default; }
.oletter {
  width: 26px; height: 26px; flex-shrink: 0;
  border-radius: 10px; border: 1.5px solid #1e2e4a;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 0.75rem;
  background: #111e33; color: #7a90b8;
}
.opt.correct .oletter { background: #34d399; color: #000; border-color: #34d399; }
.opt.wrong .oletter { background: #f87171; color: #fff; border-color: #f87171; }
.opt.selected .oletter { background: #2dd4bf; color: #000; border-color: #2dd4bf; }

/* FEEDBACK */
.fb { margin-top: 12px; padding: 12px 15px; border-radius: 10px; font-size: 0.83rem; line-height: 1.55; display: none; }
.fb.show { display: block; }
.fb.fb-ok { background: #071a10; border: 1px solid #166534; color: #6ee7b7; }
.fb.fb-fail { background: #1a0707; border: 1px solid #991b1b; color: #fca5a5; }

/* SUBMIT & RESET */
.submit-btn {
  background: #0ea5e9; color: #fff;
  border: none; border-radius: 10px;
  padding: 10px 22px; font-family: 'Outfit', sans-serif;
  font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.submit-btn:hover { background: #0284c7; }
.submit-btn:disabled { background: #1e2e4a; color: #7a90b8; cursor: default; }

.reset-btn {
  background: transparent; border: 1px solid #1e2e4a;
  color: #7a90b8; border-radius: 9px;
  padding: 9px 18px; font-family: 'Outfit', sans-serif;
  font-size: 1rem; cursor: pointer; transition: all 0.2s; margin-top: 20px;
}
.reset-btn:hover { border-color: #38bdf8; color: #38bdf8; }

/* NO SUPPORT MSG */
.no-support {
  background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
  border-radius: 10px; padding: 12px 16px;
  font-size: 0.82rem; color: #f87171; margin: 10px 0; display: none;
}

.panel { display: none; }
.panel.active { display: block; }

@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.qcard { animation: fadeUp 0.3s ease both; }
.qcard:nth-child(2){animation-delay:.05s}.qcard:nth-child(3){animation-delay:.1s}
.qcard:nth-child(4){animation-delay:.15s}.qcard:nth-child(5){animation-delay:.2s}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🎧</div>
  <div class="header-info">
    <h1>English <span>Audio</span> Practice</h1>
    <p>Listening • Pronunciación • Selección múltiple con audio</p>
  </div>
  <div class="score-area">
    <div class="score-num" id="gscore">0</div>
    <div class="score-lbl">puntos</div>
  </div>
</div>

<div class="tabs-bar" id="tabs"></div>
<div id="panels"></div>

<audio id="player" style="display:none"></audio>

<script>
   let speechRate = 1;

// ─── SPEECH SYNTHESIS HELPER ──────────────────────────────────────────────────
   
async function speak(text, btn) {
  const audio = document.getElementById("player");
  const key = "tts_" + text;

  if (btn) btn.textContent = '⏳';

  try {
    // 🔥 CACHE
    const saved = localStorage.getItem(key);
     
    if (saved && saved.startsWith("data:audio")) {
  audio.pause();
  audio.currentTime = 0;
  audio.src = saved;
  audio.playbackRate = speechRate || 1;

  try {
    await audio.play();
  } catch (err) {
    console.error("ERROR PLAY CACHE:", err);
    localStorage.removeItem(key);
  }

  if (btn) btn.textContent = '▶';
  return;
}

    // 🔥 FETCH
    const res = await fetch('/.netlify/functions/tts', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });

    if (!res.ok) {
  console.error("TTS error:", res.status);

  // 🔥 FALLBACK NATIVO
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = speechRate || 1;
  utter.lang = 'en-US';
  speechSynthesis.speak(utter);

  if (btn) btn.textContent = '▶';
  return;
}

    const data = await res.json();

    if (!data.audio) {
      console.error("No audio", data);
      if (btn) btn.textContent = '❌';
      return;
    }

    // 🔥 GUARDAR
    localStorage.setItem(key, data.audio);

    // 🔥 PLAY
    audio.pause();
    audio.currentTime = 0;
    audio.src = data.audio;
    audio.playbackRate = speechRate || 1;

    try {
      await audio.play();
    } catch (err) {
      console.error("PLAY ERROR:", err);
    }

    if (btn) btn.textContent = '▶';

 } catch (err) {
  console.error("TTS FALLÓ:", err);

  // 🔥 FALLBACK TAMBIÉN AQUÍ
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = speechRate || 1;
  utter.lang = 'en-US';
  speechSynthesis.speak(utter);

  if (btn) btn.textContent = '▶';
}
}
// ─── SPEECH RECOGNITION ───────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function runRecognition(targetText, cardId, qi, mi) {
  if (!SpeechRecognition) {
    const ns = document.getElementById(`nosupport-${mi}-${qi}`);
    if (ns) ns.style.display = 'block';
    return;
  }
  const rec = new SpeechRecognition();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 5;

  const micBtn = document.querySelector(`#card-${mi}-${qi} .mic-btn`);
  const statusEl = document.getElementById(`micstatus-${mi}-${qi}`);
  const resultEl = document.getElementById(`micresult-${mi}-${qi}`);

  micBtn.classList.add('recording');
  micBtn.textContent = '⏹';
  if (statusEl) statusEl.textContent = '🔴 Escuchando…';

  rec.onresult = (e) => {
    const heard = Array.from(e.results[0]).map(r => r.transcript.toLowerCase().trim());
    const target = targetText.toLowerCase().trim();
    const best = heard[0];

    if (resultEl) {
      resultEl.textContent = `Detecté: "${best}"`;
      resultEl.className = 'mic-result heard';
    }

    const match = heard.some(h => similarity(h, target) >= 0.70);
    gradeMic(mi, qi, match, best, targetText);
  };

  rec.onerror = (e) => {
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    if (statusEl) statusEl.textContent = e.error === 'not-allowed'
      ? '❌ Permiso de micrófono denegado'
      : '❌ No se pudo escuchar. Intenta de nuevo.';
  };

  rec.onend = () => {
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎤';
    if (statusEl && statusEl.textContent === '🔴 Escuchando…')
      statusEl.textContent = 'Toca el micrófono para intentar de nuevo.';
  };

  rec.start();

  micBtn.onclick = () => { rec.stop(); };
}

function similarity(a, b) {
  a = a.replace(/[^a-z0-9 ]/g,''); b = b.replace(/[^a-z0-9 ]/g,'');
  if (a === b) return 1;
  const wordsA = a.split(' '); const wordsB = b.split(' ');
  const common = wordsA.filter(w => wordsB.includes(w)).length;
  return (2 * common) / (wordsA.length + wordsB.length);
}
  
// ─── DATA ─────────────────────────────────────────────────────────────────────
const MODULES = [

// ══ M1 – LISTENING: VERB TO BE ══
{
  num:'01', title:'Listening – Verb To Be',
  desc:'Escucha y selecciona la oración correcta',
  qs:[
    { type:'listen',
      audio:'I am a student.',
      opts:['I am a student.','I is a student.','I are a student.','He am a student.'], ans:0,
      exp:'La oración correcta es <strong>"I am a student."</strong> Con <em>I</em> siempre usamos <em>am</em>.' },
    { type:'listen',
      audio:'She is from Costa Rica.',
      opts:['She are from Costa Rica.','She am from Costa Rica.','She is from Costa Rica.','He is from Costa Rica.'], ans:2,
      exp:'<strong>She is from Costa Rica.</strong> Con she/he/it usamos <em>is</em>.' },
    { type:'listen',
      audio:'They are very happy today.',
      opts:['They is very happy today.','They am very happy today.','We are very happy today.','They are very happy today.'], ans:3,
      exp:'<strong>They are very happy today.</strong> Con they/we/you (plural) usamos <em>are</em>.' },
    { type:'listen',
      audio:'Are you a teacher?',
      opts:['Is you a teacher?','Am you a teacher?','Are you a teacher?','Do you a teacher?'], ans:2,
      exp:'<strong>Are you a teacher?</strong> En preguntas se invierte: Are + you.' },
    { type:'listen',
      audio:'He is not at home right now.',
      opts:["He isn't at home right now.",'He aren\'t at home right now.','He is not at home right now.','He not is at home right now.'], ans:2,
      exp:'<strong>He is not at home right now.</strong> La negación: is not / isn\'t.' },
    { type:'listen',
      audio:'We are students from San José.',
      opts:['We is students from San José.','We are students from San José.','They are students from San José.','We am students from San José.'], ans:1,
      exp:'<strong>We are students from San José.</strong> We → are.' },
    { type:'listen',
      audio:'It is a beautiful day.',
      opts:['It are a beautiful day.','It am a beautiful day.','It is a beautiful day.','It be a beautiful day.'], ans:2,
      exp:'<strong>It is a beautiful day.</strong> It → is.' },
    { type:'listen',
      audio:"I'm not tired, I'm hungry.",
      opts:["I'm not tired, I'm hungry.","I'm not tired, I'm thirsty.","I not tired, I'm hungry.","I am not tired, I are hungry."], ans:0,
      exp:'<strong>I\'m not tired, I\'m hungry.</strong> Contracciones: I am = I\'m.' },
    { type:'listen',
      audio:'Is she your sister?',
      opts:['Are she your sister?','Is she your sister?','Am she your sister?','Does she your sister?'], ans:1,
      exp:'<strong>Is she your sister?</strong> Pregunta: Is + she.' },
    { type:'listen',
      audio:"You aren't late, you are early.",
      opts:["You isn't late, you are early.","You aren't late, you are early.","You amn't late, you are early.","You not late, you are early."], ans:1,
      exp:"<strong>You aren't late, you are early.</strong> aren't = are not." }
  ]
},

// ══ M2 – PRONUNCIACIÓN: SUBJECT PRONOUNS ══
{
  num:'02', title:'Pronunciación – Pronouns',
  desc:'Escucha, luego repite la oración en voz alta',
  qs:[
    { type:'speak', phrase:'I am from Costa Rica.', phonetic:'/aɪ æm frəm ˈkɒstə ˈriːkə/',
      exp:'<strong>I am from Costa Rica.</strong> Practica la vocal abierta de <em>am</em> y la entonación descendente.' },
    { type:'speak', phrase:'She is my best friend.', phonetic:'/ʃiː ɪz maɪ bɛst frɛnd/',
      exp:'<strong>She is my best friend.</strong> Nota cómo <em>is</em> se enlaza con <em>my</em> en el habla natural.' },
    { type:'speak', phrase:'They are students.', phonetic:'/ðeɪ ɑːr ˈstjuːdənts/',
      exp:'<strong>They are students.</strong> La <em>th</em> de <em>they</em> es sonora: /ð/.' },
    { type:'speak', phrase:'We are very happy.', phonetic:'/wiː ɑːr ˈvɛri ˈhæpi/',
      exp:'<strong>We are very happy.</strong> Enfatiza la doble <em>p</em> en <em>happy</em>.' },
    { type:'speak', phrase:'He is a good student.', phonetic:'/hiː ɪz ə ɡʊd ˈstjuːdənt/',
      exp:'<strong>He is a good student.</strong> El artículo <em>a</em> suena reducido: /ə/.' },
    { type:'speak', phrase:'It is raining outside.', phonetic:'/ɪt ɪz ˈreɪnɪŋ ˌaʊtˈsaɪd/',
      exp:'<strong>It is raining outside.</strong> La <em>ing</em> final suena /ɪŋ/, no /in/.' },
    { type:'speak', phrase:'You are my favorite teacher.', phonetic:'/juː ɑːr maɪ ˈfeɪvərɪt ˈtiːtʃər/',
      exp:'<strong>You are my favorite teacher.</strong> <em>Favorite</em> tiene tres sílabas: FAV-or-ite.' },
    { type:'speak', phrase:"I'm not late, I'm on time.", phonetic:"/aɪm nɒt leɪt aɪm ɒn taɪm/",
      exp:"<strong>I'm not late, I'm on time.</strong> I'm = contracción rápida, casi un solo sonido." },
    { type:'speak', phrase:'They are not from here.', phonetic:'/ðeɪ ɑːr nɒt frəm hɪər/',
      exp:'<strong>They are not from here.</strong> <em>Here</em> suena con /h/ aspirada inicial.' },
    { type:'speak', phrase:'She and I are best friends.', phonetic:'/ʃiː ənd aɪ ɑːr bɛst frɛndz/',
      exp:'<strong>She and I are best friends.</strong> <em>and</em> se reduce a /ənd/ en habla conectada.' }
  ]
},

// ══ M3 – LISTENING: PRESENT SIMPLE ══
{
  num:'03', title:'Listening – Present Simple',
  desc:'Escucha la oración y elige la que oíste',
  qs:[
    { type:'listen',
      audio:'She drinks coffee every morning.',
      opts:['She drink coffee every morning.','She drinks coffee every morning.','She is drinking coffee every morning.','She drank coffee every morning.'], ans:1,
      exp:'<strong>She drinks coffee every morning.</strong> Con she/he/it el verbo lleva <em>-s</em>.' },
    { type:'listen',

function buildCard(q, mi, qi) {
  const card = document.createElement('div');
  card.className = 'qcard'; card.id = `card-${mi}-${qi}`;

  let pillClass='', pillLabel='', body='';

  if (q.type==='listen') {
    pillClass='pill-listen'; pillLabel='🎧 Listening';
    body = `
      <div class="audio-box">
        <button class="play-btn" id="play-${mi}-${qi}" onclick="playAudio(this.dataset.text, this)"
data-text="${q.audio}">▶</button>
        <div class="audio-info">
          <div class="audio-label">Toca ▶ para escuchar la oración</div>
          <div class="audio-text-hidden" id="reveal-${mi}-${qi}">${q.audio}</div>
          <div class="replay-hint">Puedes escuchar varias veces</div>
        </div>
        <div class="speed-wrap">
          <button class="speed-btn active" onclick="setSpeed(0.6, this, ${mi}, ${qi})">🐢</button>
          <button class="speed-btn" onclick="setSpeed(1.0, this, ${mi}, ${qi})">🐇</button>
        </div>
      </div>
      <div class="options" id="opts-${mi}-${qi}">
        ${q.opts.map((o,oi)=>`
          <div class="opt" id="opt-${mi}-${qi}-${oi}" onclick="pickOpt(${mi},${qi},${oi})">
            <span class="oletter">${['A','B','C','D'][oi]}</span>${o}
          </div>`).join('')}
      </div>`;
  } else if (q.type==='speak') {
    pillClass='pill-speak'; pillLabel='🎤 Pronunciación';
    body = `
      <div class="audio-box">
        <button class="play-btn" id="play-${mi}-${qi}" onclick="playAudio('${q.phrase.replace(/'/g,"\\'")}', this)">▶</button>
        <div class="audio-info">
          <div class="audio-label">Escucha primero el modelo</div>
          <div class="replay-hint">Luego repite en voz alta ↓</div>
        </div>
        <div class="speed-wrap">
          <button class="speed-btn active" onclick="setSpeed(0.6, this, ${mi}, ${qi})">🐢</button>
          <button class="speed-btn" onclick="setSpeed(1.0, this, ${mi}, ${qi})">🐇</button>
        </div>
      </div>
      <div class="mic-box">
        <div class="mic-target">"${q.audio || q.phrase}"</div>
        <div class="mic-phonetic">${q.phonetic}</div>
     <button class="mic-btn"data-text="${(q.audio || q.phrase).replace(/"/g, '&quot;')}" onclick="startRecognition(this, this.dataset.text, ${mi}, ${qi})">🎤</button>
        <div class="mic-status" id="micstatus-${mi}-${qi}">Toca el micrófono y habla</div>
        <div class="mic-result" id="micresult-${mi}-${qi}"></div>
        <div class="no-support" id="nosupport-${mi}-${qi}">⚠️ Tu navegador no soporta reconocimiento de voz. Usa Chrome en Android o escritorio.</div>
        ${state[mi] && !state[mi][qi]?.answered ? `<button class="submit-btn" id="sub-${mi}-${qi}" onclick="manualPass(${mi},${qi})" style="margin-top:10px;background:#2a2a3a;color:#8892b0;font-size:0.75rem">✓ Marcar como practicado</button>` : ''}
      </div>`;
  }

  body += `<div class="fb" id="fb-${mi}-${qi}"></div>`;

  card.innerHTML = `
    <div class="qhead">
      <div class="qnum" id="qn-${mi}-${qi}">${qi+1}</div>
      <div class="qtext">${q.q || (q.type==='listen' ? 'Escucha y selecciona la oración que oíste:' : 'Escucha el modelo y repite en voz alta:')}</div>
      <span class="type-pill ${pillClass}">${pillLabel}</span>
    </div>
    ${body}`;
  return card;
}

// ─── SPEED ────────────────────────────────────────────────────────────────────
function setSpeed(rate, btn, mi, qi) {
  speechRate = rate;
  btn.closest('.speed-wrap').querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function playAudio(text, btn) {
  speak(text, btn);
}

// ─── LISTENING ANSWER ─────────────────────────────────────────────────────────
function pickOpt(mi, qi, oi) {
  if (state[mi][qi].answered) return;
  const q = MODULES[mi].qs[qi];
  const correct = oi === q.ans;
  state[mi][qi] = {answered:true, correct};

  ['A','B','C','D'].forEach((_,i)=>{
    const el = document.getElementById(`opt-${mi}-${qi}-${i}`);
    if(!el) return;
    el.classList.add('disabled');
    if(i===q.ans) el.classList.add('correct');
    else if(i===oi && !correct) el.classList.add('wrong');
  });

  // Reveal the answer text
  const rv = document.getElementById(`reveal-${mi}-${qi}`);
  if(rv) rv.classList.add('revealed');

  showFb(mi,qi,correct,null,q.exp);
  markCard(mi,qi,correct);
  addScore(correct);
  updateProgress(mi);
}

// ─── SPEAKING ANSWER ──────────────────────────────────────────────────────────
function startRecognition(btn, phrase, mi, qi) {
  if (state[mi][qi].answered) return;
  runRecognition(phrase, null, qi, mi);
}
function gradeMic(mi, qi, correct, heard, target) {
  const q = MODULES[mi].qs[qi];
  state[mi][qi] = {answered:true, correct};

  const statusEl = document.getElementById(`micstatus-${mi}-${qi}`);
  const subBtn = document.getElementById(`sub-${mi}-${qi}`);
  if(statusEl) statusEl.textContent = correct ? '✅ ¡Excelente pronunciación!' : '❌ Inténtalo de nuevo o marca como practicado.';
  if(subBtn) subBtn.style.display = correct ? 'none' : 'inline-block';

  if(correct) {
    showFb(mi,qi,true,null,q.exp);
    markCard(mi,qi,true);
    addScore(true);
    updateProgress(mi);
  } else {
    const fb = document.getElementById(`fb-${mi}-${qi}`);
    if(fb) {
      fb.innerHTML = `❌ Detecté: <strong>"${heard}"</strong><br>Objetivo: <strong>"${target}"</strong><br><br>${q.exp}`;
      fb.className='fb show fb-fail';
    }
    // Allow retry for speaking
    state[mi][qi] = {answered:false, correct:false};
  }
}

function manualPass(mi, qi) {
  const q = MODULES[mi].qs[qi];
  state[mi][qi] = {answered:true, correct:true};
  const statusEl = document.getElementById(`micstatus-${mi}-${qi}`);
  if(statusEl) statusEl.textContent = '✅ Marcado como practicado';
  const subBtn = document.getElementById(`sub-${mi}-${qi}`);
  if(subBtn) subBtn.style.display='none';
  showFb(mi,qi,true,null,q.exp);
  markCard(mi,qi,true);
  addScore(true);
  updateProgress(mi);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function showFb(mi,qi,correct,ans,exp) {
  const fb = document.getElementById(`fb-${mi}-${qi}`);
  if(!fb) return;
  fb.innerHTML = `${correct?'✅ Correcto!':'❌ Incorrecto.'} ${exp||''}`;
  fb.className = `fb show ${correct?'fb-ok':'fb-fail'}`;
}

function markCard(mi,qi,correct) {
  const c=document.getElementById(`card-${mi}-${qi}`);
  const n=document.getElementById(`qn-${mi}-${qi}`);
  if(c) c.classList.add(correct?'ok':'fail');
  if(n) n.textContent = correct?'✓':'✗';
}

function addScore(correct) {
  if(correct) {
    totalScore += 10;
    const el=document.getElementById('gscore');
    if(el) el.textContent=totalScore;
  }
}

function updateProgress(mi) {
  const answered = Object.values(state[mi]).filter(s=>s.answered).length;
  const pf=document.getElementById(`pf-${mi}`);
  const pt=document.getElementById(`pt-${mi}`);
  if(pf) pf.style.width=(answered/10*100)+'%';
  if(pt) pt.textContent=`${answered}/10`;
  const correct=Object.values(state[mi]).filter(s=>s.correct).length;
  const tc=document.getElementById(`tc-${mi}`);
  if(tc) tc.textContent=answered===10?` ${correct}/10`:'';
}

function switchTab(mi) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===mi));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===mi));
}

function resetModule(mi) {
  Object.values(state[mi]).forEach(s=>{if(s.correct)totalScore-=10;});
  const el=document.getElementById('gscore');
  if(el) el.textContent=Math.max(0,totalScore);
  state[mi]={};
  MODULES[mi].qs.forEach((_,qi)=>{ state[mi][qi]={answered:false,correct:false}; });
  const qsEl=document.getElementById(`qs-${mi}`);
  if(qsEl){ qsEl.innerHTML=''; MODULES[mi].qs.forEach((q,qi)=>qsEl.appendChild(buildCard(q,mi,qi))); }
  updateProgress(mi);
}

// Load voices
console.log("FIN SCRIPT");
</script>
</body>
